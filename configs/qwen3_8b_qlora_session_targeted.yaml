experiment_name: qwen3_8b_session_qlora_targeted_token_scaleup
model_name_or_path: Qwen/Qwen3-8B
task_type: causal_lm
representation: structured_session_jsonl
objective: benign_only_next_token_modeling

training:
  max_seq_len: 2048
  micro_batch_size: 2
  gradient_accumulation_steps: 4
  num_train_epochs: 1
  learning_rate: 1.5e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 20
  save_steps: 1000
  bf16: true
  gradient_checkpointing: true

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - up_proj
    - down_proj
    - gate_proj

delta_extraction:
  layers:
    - 18
    - 26
    - 34
  pool_unit: token
  store_dtype: float16
  chunk_examples: 1024
